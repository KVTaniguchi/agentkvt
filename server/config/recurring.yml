production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  delta_monitor:
    class: DeltaMonitorJob
    queue: background
    schedule: every hour at minute 30

  rss_feed_poller:
    class: RssFeedPollerJob
    queue: background
    schedule: every 15 minutes

  maintenance_monitor:
    class: MaintenanceMonitorJob
    queue: background
    schedule: every day at 8am

  health_scout:
    class: HealthScoutJob
    queue: background
    schedule: every monday at 7am
